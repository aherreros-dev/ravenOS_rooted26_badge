; ============================================================================
;  REDR4VEN Badge — platformio.ini
;
;  Directory layout (same as original repo):
;    <project>/
;      platformio.ini               <- this file
;      esp32/
;        redr4ven_badge.cpp         <- the firmware
;      rooted2026_renvu_badge.csv   <- keep the original partition CSV
; ============================================================================

[platformio]
default_envs = redr4ven_badge

[env:redr4ven_badge]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

monitor_speed   = 115200
monitor_dtr     = 0
monitor_rts     = 0
monitor_filters = default
upload_speed    = 921600

; Keep the same partition table as the original
board_build.partitions = rooted2026_renvu_badge.csv

; Point to the renamed source file
build_src_filter = +<redr4ven_badge.cpp>

; ---------------------------------------------------------------------------
; Build flags 
; ---------------------------------------------------------------------------
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -O2
    -DUSER_SETUP_LOADED
    -DST7735_DRIVER
    -DST7735_GREENTAB
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DTFT_BACKLIGHT_ON=LOW
    -DTFT_MOSI=23
    -DTFT_MISO=-1
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=4
    -DTFT_BL=12
    -DROOTED_BADGE_SCREEN_EN=21
    -DTOUCH_CS=-1
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=8000000
    -DSPI_READ_FREQUENCY=8000000
    -DSPI_TOUCH_FREQUENCY=2500000

lib_deps =
    bodmer/TFT_eSPI@^2.5.43